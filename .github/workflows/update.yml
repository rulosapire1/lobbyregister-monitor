name: Lobbyregister Monitor

on:
  schedule:
    - cron: '0 6 * * 1'  # Jeden Montag um 6:00 Uhr UTC
  workflow_dispatch:       # Manueller Start jederzeit möglich

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-site:
    name: Seite aktualisieren
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Daten abrufen und Seite generieren
        env:
          LOBBYREGISTER_API_KEY: ${{ secrets.LOBBYREGISTER_API_KEY }}
        run: python scripts/fetch_and_build.py

      - name: data.json für nächsten Job speichern
        uses: actions/upload-artifact@v4
        with:
          name: lobbyregister-data
          path: docs/data.json
          retention-days: 1

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Dateien hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4

  send-email:
    name: Wöchentliche Mail versenden
    runs-on: ubuntu-latest
    needs: build-site
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Daten vom vorherigen Job laden
        uses: actions/download-artifact@v4
        with:
          name: lobbyregister-data
          path: docs

      - name: E-Mail versenden
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          LOBBYREGISTER_API_KEY: ${{ secrets.LOBBYREGISTER_API_KEY }}
          SITE_URL: "https://bmwe-iiia4.github.io/lobbyregister-monitor"
        run: python scripts/send_email.py

  health-check:
    name: Wöchentlicher Selbsttest
    runs-on: ubuntu-latest
    needs: [build-site, send-email]
    if: always()
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Selbsttest durchführen
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          LOBBYREGISTER_API_KEY: ${{ secrets.LOBBYREGISTER_API_KEY }}
          SITE_URL: "https://bmwe-iiia4.github.io/lobbyregister-monitor"
        run: python scripts/health_check.py
        continue-on-error: true
