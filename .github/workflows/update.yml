name: Lobbyregister Monitor

on:
  schedule:
    # Täglich um 01:00 UTC = 02:00 MEZ (Winter) / 03:00 MESZ (Sommer)
    # Um konsistent 02:00 Berliner Winterzeit zu haben: 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:       # Manueller Start jederzeit möglich
    inputs:
      force_email:
        description: 'E-Mail trotzdem versenden? (nur bei manuellem Start)'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TZ: Europe/Berlin  # Zeitzone für alle Schritte setzen

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-site:
    name: Seite aktualisieren (taeglich)
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhaengigkeiten installieren
        run: pip install requests pytz

      - name: Daten-Cache wiederherstellen
        uses: actions/cache@v4
        with:
          path: |
            docs/data.json
            docs/gemini_cache.json
            docs/run_history.json
          key: lobbyregister-data-${{ github.run_id }}
          restore-keys: |
            lobbyregister-data-

      - name: Daten abrufen und Seite generieren (inkrementell)
        env:
          LOBBYREGISTER_API_KEY: ${{ secrets.LOBBYREGISTER_API_KEY }}
        run: python scripts/fetch_and_build.py

      - name: Gemini-Anreicherung (Relevanzfilter + Zusammenfassungen + HTML-Rebuild)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        run: python scripts/gemini_enrich.py
        continue-on-error: true

      - name: Admin-Panel Passwort-Hash einfuegen
        env:
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
        run: python scripts/inject_admin_hash.py

      - name: Workflow-Protokoll speichern
        run: python scripts/save_run_log.py
        continue-on-error: true

      - name: data.json fuer Mail-Job speichern
        uses: actions/upload-artifact@v4
        with:
          name: lobbyregister-data
          path: docs/data.json
          retention-days: 7

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Dateien hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4

  send-email:
    name: Woechentliche Mail versenden (montags, nur automatisch)
    runs-on: ubuntu-latest
    needs: build-site
    # Nur ausführen wenn:
    # 1. Automatischer Schedule-Run (nicht manuell) ODER
    # 2. Manuell mit force_email=true
    if: |
      (github.event_name == 'schedule') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.force_email == 'true')
    steps:
      - name: Wochentag pruefen
        id: check_day
        run: |
          # Zeitzone auf Berlin setzen
          export TZ=Europe/Berlin
          DAY=$(date +%u)
          echo "weekday=$DAY" >> $GITHUB_OUTPUT
          echo "Heute ist Wochentag $DAY (1=Montag)"
          if [ "$DAY" = "1" ]; then
            echo "is_monday=true" >> $GITHUB_OUTPUT
          else
            echo "is_monday=false" >> $GITHUB_OUTPUT
          fi

      - name: Repository auschecken
        if: steps.check_day.outputs.is_monday == 'true'
        uses: actions/checkout@v4

      - name: Python einrichten
        if: steps.check_day.outputs.is_monday == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhaengigkeiten installieren
        if: steps.check_day.outputs.is_monday == 'true'
        run: pip install requests

      - name: Daten vom Build-Job laden
        if: steps.check_day.outputs.is_monday == 'true'
        uses: actions/download-artifact@v4
        with:
          name: lobbyregister-data
          path: docs

      - name: E-Mail versenden
        if: steps.check_day.outputs.is_monday == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          LOBBYREGISTER_API_KEY: ${{ secrets.LOBBYREGISTER_API_KEY }}
          SITE_URL: "https://lobbyregister-bot.de"
        run: python scripts/send_email.py

  health-check:
    name: Woechentlicher Selbsttest (montags, nur automatisch)
    runs-on: ubuntu-latest
    needs: build-site
    # Nur bei automatischem Schedule-Run (nicht manuell)
    if: github.event_name == 'schedule'
    steps:
      - name: Wochentag pruefen
        id: check_day
        run: |
          export TZ=Europe/Berlin
          DAY=$(date +%u)
          if [ "$DAY" = "1" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Repository auschecken
        if: steps.check_day.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Python einrichten
        if: steps.check_day.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhaengigkeiten installieren
        if: steps.check_day.outputs.run == 'true'
        run: pip install requests

      - name: Selbsttest durchfuehren
        if: steps.check_day.outputs.run == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          LOBBYREGISTER_API_KEY: ${{ secrets.LOBBYREGISTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SITE_URL: "https://lobbyregister-bot.de"
        run: python scripts/health_check.py
        continue-on-error: true
