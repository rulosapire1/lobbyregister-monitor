name: Lobbyregister Monitor

on:
  schedule:
    - cron: '0 4 * * *'   # Täglich um 6:00 Uhr MESZ (= 4:00 UTC im Sommer)
    # Hinweis: GitHub Actions nutzt UTC. Im Winter (MEZ) auf '0 5 * * *' ändern.
  workflow_dispatch:       # Manueller Start jederzeit möglich

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-site:
    name: Seite aktualisieren (täglich)
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Daten abrufen und Seite generieren
        env:
          LOBBYREGISTER_API_KEY: ${{ secrets.LOBBYREGISTER_API_KEY }}
        run: python scripts/fetch_and_build.py

      - name: Gemini-Anreicherung (Relevanzfilter + Zusammenfassungen)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        run: python scripts/gemini_enrich.py
        continue-on-error: true

      - name: HTML mit angereicherten Daten neu generieren
        run: python scripts/rebuild_html.py

      - name: data.json für Mail-Job speichern
        uses: actions/upload-artifact@v4
        with:
          name: lobbyregister-data
          path: docs/data.json
          retention-days: 7

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Dateien hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4

  send-email:
    name: Wöchentliche Mail versenden (montags)
    runs-on: ubuntu-latest
    needs: build-site
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 4') && toJSON(github.event) != '{}')
    steps:
      - name: Wochentag prüfen
        id: check_day
        run: |
          DAY=$(date +%u)
          echo "weekday=$DAY" >> $GITHUB_OUTPUT
          if [ "$DAY" = "1" ]; then
            echo "is_monday=true" >> $GITHUB_OUTPUT
          else
            echo "is_monday=false" >> $GITHUB_OUTPUT
          fi

      - name: Repository auschecken
        if: steps.check_day.outputs.is_monday == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Python einrichten
        if: steps.check_day.outputs.is_monday == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        if: steps.check_day.outputs.is_monday == 'true' || github.event_name == 'workflow_dispatch'
        run: pip install requests

      - name: Daten vom Build-Job laden
        if: steps.check_day.outputs.is_monday == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          name: lobbyregister-data
          path: docs

      - name: E-Mail versenden
        if: steps.check_day.outputs.is_monday == 'true' || github.event_name == 'workflow_dispatch'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          LOBBYREGISTER_API_KEY: ${{ secrets.LOBBYREGISTER_API_KEY }}
          SITE_URL: "https://lobbyregister-bot.de"
        run: python scripts/send_email.py

  health-check:
    name: Wöchentlicher Selbsttest (montags)
    runs-on: ubuntu-latest
    needs: build-site
    if: always()
    steps:
      - name: Wochentag prüfen
        id: check_day
        run: |
          DAY=$(date +%u)
          if [ "$DAY" = "1" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Repository auschecken
        if: steps.check_day.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Python einrichten
        if: steps.check_day.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        if: steps.check_day.outputs.run == 'true'
        run: pip install requests

      - name: Selbsttest durchführen
        if: steps.check_day.outputs.run == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          LOBBYREGISTER_API_KEY: ${{ secrets.LOBBYREGISTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SITE_URL: "https://lobbyregister-bot.de"
        run: python scripts/health_check.py
        continue-on-error: true
