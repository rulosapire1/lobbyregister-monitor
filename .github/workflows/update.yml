name: Lobbyregister Monitor

on:
  schedule:
    - cron: '0 6 * * 1'  # Jeden Montag um 6:00 Uhr UTC
  workflow_dispatch:       # Manueller Start jederzeit möglich

jobs:
  build-site:
    name: Seite aktualisieren
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Daten abrufen und Seite generieren
        env:
          LOBBYREGISTER_API_KEY: ${{ secrets.LOBBYREGISTER_API_KEY }}
        run: python scripts/fetch_and_build.py

      - name: Seite auf GitHub Pages veröffentlichen
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          commit_message: "Automatische Aktualisierung vom ${{ github.run_id }}"

  send-email:
    name: Wöchentliche Mail versenden
    runs-on: ubuntu-latest
    needs: build-site
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: E-Mail versenden
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          LOBBYREGISTER_API_KEY: ${{ secrets.LOBBYREGISTER_API_KEY }}
          SITE_URL: "https://rulosapire1.github.io/lobbyregister-monitor"
        run: python scripts/send_email.py

  health-check:
    name: Wöchentlicher Selbsttest
    runs-on: ubuntu-latest
    needs: [build-site, send-email]
    if: always()  # Immer ausführen, auch wenn vorherige Jobs fehlschlagen
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Selbsttest durchführen
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          LOBBYREGISTER_API_KEY: ${{ secrets.LOBBYREGISTER_API_KEY }}
          SITE_URL: "https://rulosapire1.github.io/lobbyregister-monitor"
        run: python scripts/health_check.py
        continue-on-error: true  # Selbsttest-Fehler soll Workflow nicht blockieren
